server:
  servlet:
    context-path: /fhir

spring:
  datasource:
    url: jdbc:h2:mem:hapi
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update

hapi:
  fhir:
    fhir_version: R4
    allow_external_references: true
    narrative_enabled: true

logging:
  level:
    root: INFO
    ca.uhn.fhir: INFO